A blissful blur comes
as I get tangled in my thoughts.
When I close my eyes,
I pretend I see everything.
The world is kind,

I am left deafened
by the things that are beyond me.
so I slip back into silence—
the only place that doesn’t ask too much. </em><p>

A Malay warrior addresses the moon—pale, distant, and sorrowful—a stand-in for the coloniser. Instead of anger, he speaks softly: “Hello pale friend moon, could it be that you too think of me?” <p>
Drawing from Wayang Kulit, the traditional Javanese shadow theatre, where stories are told by means of light, silhouettes, and fragile cut-out figures. Alongside the puppets, Thaqif presents an archive of prints from his investigation—shifting projections that expose distortion as both wound and possibility. <p>
How can colonial projections be reimagined through shadow puppetry? And how can reflection, rather than hostility, begin to heal the wounds of the Malay archipelago? <p>
In this installation, it is the language of the shadows that becomes a metaphor for colonial memory.    </p>

    <p>
The Colonial Framing of Laziness examines how idleness—long dismissed through colonial and capitalist narratives as wasteful or inferior—can instead be understood as a form of refusal. Drawing from both traditional practices and contemporary cultural forms, this publication explores how creative stillness, slowness, and non-productivity function as subtle acts of resistance against systems that equate value with labour, efficiency, and progress.<p>
Centred on the theme of rehearsing refusal, this work reinterprets traditional craft, music, and everyday gestures as spaces where alternative temporalities and ways of being emerge. Through these practices, it traces how individuals and communities persistently renegotiate the legacies of colonial projection, opening pathways toward more grounded, decolonial modes of making, living, and imagining.<p>
The Colonial Framing of Laziness examines how idleness—long framed as a colonial flaw—can become a deliberate act of refusal. Through gestures of craft, music, and slow making, it searches for decolonial ways of being that move gently against the demands of productivity.
