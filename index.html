  <script src="scroll.js"></script>
 <script>
document.addEventListener('DOMContentLoaded', () => {
  const artworkToggle = document.getElementById("toggle-artwork");
  const descriptionToggle = document.getElementById("toggle-description");
  const artworkMenu = document.getElementById("menu");
  const descriptionMenu = document.getElementById("menu2");
  const carousel = document.getElementById("carousel");
  const buttons = document.querySelectorAll('#menu button');

  // ----------------- Menu Toggle -----------------
  function toggleMenu(menu) {
    if (!menu.style.height || menu.style.height === "0px") {
      menu.style.height = menu.scrollHeight + "px";
      menu.setAttribute("aria-hidden", "false");
    } else {
      menu.style.height = "0px";
      menu.setAttribute("aria-hidden", "true");
    }
  }

  artworkToggle?.addEventListener("click", () => toggleMenu(artworkMenu));
  descriptionToggle?.addEventListener("click", () => toggleMenu(descriptionMenu));

  // ----------------- Smooth Scroll Function -----------------
  function smoothScrollTo(element, targetLeft, duration = 1000) {
    const startLeft = element.scrollLeft;
    const distance = targetLeft - startLeft;
    const startTime = performance.now();

    function step(currentTime) {
      const elapsed = currentTime - startTime;
      const progress = Math.min(elapsed / duration, 1);
      const ease = progress < 0.5
        ? 2 * progress * progress
        : -1 + (4 - 2 * progress) * progress; // easeInOut

      element.scrollLeft = startLeft + distance * ease;

      if (elapsed < duration) requestAnimationFrame(step);
    }

    requestAnimationFrame(step);
  }

  // ----------------- Scroll to Artwork on Click -----------------
  buttons.forEach(button => {
    button.addEventListener("click", (event) => {
      event.stopPropagation();
      const targetId = button.getAttribute("data-target");
      const target = document.getElementById(targetId);
      if (!target || !carousel) return;

      const offsetLeft = target.offsetLeft - (carousel.offsetWidth / 2) + (target.offsetWidth / 2);

      // Detect Safari
      const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);
      if (isSafari) {
        smoothScrollTo(carousel, offsetLeft, 1000); // adjust duration for speed
      } else {
        carousel.scrollTo({ left: offsetLeft, behavior: 'smooth' });
      }
    });
  });

  // ----------------- Autoplay first video if exists -----------------
  window.addEventListener('load', () => {
    const video = document.querySelector('video');
    if (video) video.play().catch((e) => console.log('Autoplay failed:', e));
  });
});
</script>
